services:

  redis:
    image: redis:7-alpine
    container_name: granthub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: granthub-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Перекрывают .env: внутри контейнера localhost — это сам контейнер,
      # а не сервис redis. Без этого Celery не находит брокер.
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Абсолютный путь на именованный том, иначе SQLite-файл жил бы внутри
      # контейнера и терялся при каждом пересоздании.
      DATABASE_URL: sqlite+aiosqlite:////app/data/dev.db
    volumes:
      # Монтируем только логи и данные. Исходники не пробрасываем: том
      # поверх /app затёр бы собранный в образе granthub_front-main/dist.
      - ./logs:/app/logs
      - granthub-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Проверяем, что ASGI-сервер поднялся. /api/v1/health тут не годится:
      # он ходит в Upstash (REST), которого в compose нет, и вернул бы 503.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  celery-worker:
    build: .
    container_name: granthub-worker
    command: celery -A app.celery_tasks:celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Тот же том, что у app — иначе ETL-задачи писали бы в свою копию БД
      DATABASE_URL: sqlite+aiosqlite:////app/data/dev.db
      # Миграции накатывает только app, см. docker-entrypoint.sh
      RUN_MIGRATIONS: "0"
    volumes:
      - ./logs:/app/logs
      - granthub-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  granthub-data:
